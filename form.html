<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<style>
    body{
        background-image: url(formbg2.jpg);
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 100vh;
    }
    .container{
       position: absolute;
       top: 50%;
       left: 50%;
       transform: translate(-50%, -50%);
       width: 100%;
       max-width: 400px;
       padding: 20px;
       background-color: rgba(255, 255, 255, 0.9);
       border-radius: 10px;
       box-shadow: 0 4px 15px rgba(0,0,0,0.2);
       text-align: center;
    }
    h1{
       text-align: center;
       margin-bottom: 20px;
       color: #282c3f;
    }
    fieldset {
        border: none;
        padding: 0;
    }
    .login-form-input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
    }
    .submit-btn {
        background-color: #ff3f6c;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 4px;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        margin-top: 10px;
    }
    .submit-btn:hover {
        background-color: #e6395d;
    }
    .new-account-text {
        margin-top: 15px;
        font-size: 12px;
        color: #696e79;
        font-weight: 700;
        cursor: pointer;
    }
</style>
<body>
    <nav class="sec-nav">
        <div class="head">
           <img src="dhtlogo.png" height="50px" width="70px">
        </div>
        <ul>
           <li class="men">MEN</li>
           <li class="women">WOMEN </li>
           <li class="kids">KIDS</li>
           <li class="homeliving">HOME & LIVING</li>
           <li class="beauty">BEAUTY</li>
        </ul>
        <div class="input">
           <input type="text" placeholder="Search On DHT FASHION HUB">
        </div>
        <div class="icons">
           <i class="bi bi-person"></i>
           <p>Profile</p>
        </div>
        <div class="icons">
           <i class="bi bi-heart"></i>
           <p>Wishlist</p>
        </div>
        <div class="icons">
           <i class="bi bi-bag"></i>
           <p>Bag</p>
        </div>
    </nav>
  
   <div class="container">
    <fieldset>
        <h1> LOGIN </h1>
        <input type="email" id="emmail" name="email" placeholder="Enter Your Email" class="login-form-input">
        <input type="password" id="password" placeholder="Enter Your Password" class="login-form-input">
        <a href="index.html">
            <button class="submit-btn" onclick='alert("PLease Enter valid Email Id & Password")'>SUBMIT</button>
        </a>
        <p class="new-account-text">NEW ACCOUNT</p>
    </fieldset>
   </div>

   <script>
    // alert("PLease Enter valid Email Id & Password");
    </script>

</body>
</html>
